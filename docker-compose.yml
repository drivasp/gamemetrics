services:
  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: echo ruok | nc localhost 2181 || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - zookeeper_data:/data
      - zookeeper_log:/datalog
    networks:
      gamemetrics:
        ipv4_address: 172.20.0.2

  pinot-controller:
    image: apachepinot/pinot:1.0.0
    container_name: pinot-controller
    command: StartController -zkAddress zookeeper:2181
    ports:
      - "9000:9000"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:9000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped
    volumes:
      - pinot_controller_data:/opt/pinot/data
    networks:
      gamemetrics:
        ipv4_address: 172.20.0.3

  pinot-broker:
    image: apachepinot/pinot:1.0.0
    container_name: pinot-broker
    command: StartBroker -zkAddress zookeeper:2181
    ports:
      - "8099:8099"
    depends_on:
      pinot-controller:
        condition: service_healthy
    restart: unless-stopped
    networks:
      gamemetrics:
        ipv4_address: 172.20.0.4

  pinot-server:
    image: apachepinot/pinot:1.0.0
    container_name: pinot-server
    command: StartServer -zkAddress zookeeper:2181
    depends_on:
      pinot-controller:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - pinot_server_data:/opt/pinot/data
    networks:
      gamemetrics:
        ipv4_address: 172.20.0.5

  kafka:
    image: confluentinc/cp-kafka:7.7.2
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: "2160"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      gamemetrics:
        ipv4_address: 172.20.0.6

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    depends_on:
      pinot-broker:
        condition: service_started
      kafka:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      PINOT_BROKER_URL: http://pinot-broker:8099
      PINOT_CONTROLLER_URL: http://pinot-controller:9000
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FRONTEND_URL: http://localhost:4000
      RAWG_API_KEY: ${RAWG_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    restart: unless-stopped
    volumes:
      - backend_static:/app/static
    networks:
      gamemetrics:
        ipv4_address: 172.20.0.7

  etl-api:
    build: ./etl
    container_name: etl-api
    volumes:
      - ./etl/data:/etl/data
    environment:
      PINOT_CONTROLLER: http://pinot-controller:9000
      PINOT_CONTROLLER_URL: http://pinot-controller:9000
      PINOT_BROKER_URL: http://pinot-broker:8099
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      pinot-controller:
        condition: service_healthy
      pinot-broker:
        condition: service_started
      pinot-server:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      gamemetrics:
        ipv4_address: 172.20.0.8

  frontend:
    build: ./frontend/videogames-dashboard
    container_name: frontend
    ports:
      - "4000:80"
    depends_on:
      - backend
      - etl-api
    networks:
      gamemetrics:
        ipv4_address: 172.20.0.9

volumes:
  zookeeper_data:
  zookeeper_log:
  pinot_controller_data:
  pinot_server_data:
  kafka_data:
  backend_static:

networks:
  gamemetrics:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
