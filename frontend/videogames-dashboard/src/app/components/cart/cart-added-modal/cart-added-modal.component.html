<div class="modal-backdrop" *ngIf="item$ | async as item" (click)="close()">
  <div class="steam-modal" (click)="$event.stopPropagation()">
    <header class="modal-header">
      <h2>¡Añadido a tu carro!</h2>
      <button class="btn-close" (click)="close()" aria-label="Cerrar">✕</button>
    </header>

    <div class="modal-body">
      <div class="item-row">
        <img *ngIf="item.game_image" [src]="item.game_image" [alt]="item.game_name" class="thumb">
        <div *ngIf="!item.game_image" class="thumb ph">🎮</div>
        <div class="item-info">
          <h3>{{ item.game_name }}</h3>
          <p class="sub">Para mi cuenta</p>
        </div>
        <div class="item-price">
          <span class="discount" *ngIf="item.discount_pct && item.discount_pct > 0">-{{ item.discount_pct }}%</span>
          <span class="orig" *ngIf="item.original_price">{{ item.original_price | currency:'USD':'symbol':'1.2-2' }}</span>
          <span class="final">{{ item.unit_price | currency:'USD':'symbol':'1.2-2' }}</span>
        </div>
      </div>
    </div>

    <footer class="modal-footer">
      <button class="btn-secondary" (click)="continueShopping()">Seguir comprando</button>
      <button class="btn-primary" (click)="viewCart()">Ver mi carro ({{ cartCount }})</button>
    </footer>
  </div>
</div>
