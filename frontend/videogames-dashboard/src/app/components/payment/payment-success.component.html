<div class="success-page">
  <div class="box" [class.error]="!!error">
    <div class="spinner" *ngIf="loading"></div>
    <mat-icon *ngIf="!loading && !error" class="gm-icon-xl ok-icon">check_circle</mat-icon>
    <mat-icon *ngIf="!loading && error" class="gm-icon-xl err-icon">error</mat-icon>

    <h1 *ngIf="loading">Confirmando pago...</h1>
    <h1 *ngIf="!loading && !error">¡Compra completada!</h1>
    <h1 *ngIf="!loading && error">No se pudo confirmar el pago</h1>

    <p *ngIf="!error">{{ message }}</p>
    <p class="err" *ngIf="error">{{ error }}</p>

    <div class="actions" *ngIf="!loading">
      <button *ngIf="!error" class="btn-primary" routerLink="/my-library">Ir a mi biblioteca</button>
      <button class="btn-secondary" routerLink="/store">Seguir explorando la tienda</button>
      <button *ngIf="error" class="btn-primary" routerLink="/payment">Volver al pago</button>
    </div>
  </div>
</div>
