<div
  class="game-card"
  (click)="navigate()"
  (mouseenter)="hovering = true"
  (mouseleave)="hovering = false">
  <div class="card-img-wrap">
    <video
      *ngIf="game.trailer_url && hovering"
      class="card-video"
      [src]="game.trailer_url"
      autoplay
      muted
      loop
      playsinline>
    </video>
    <app-game-cover
      *ngIf="!game.trailer_url || !hovering"
      [src]="game.background_image"
      [alt]="game.name"
      [slug]="game.slug"
      [title]="game.name"
      size="card">
    </app-game-cover>
    <span class="discount-pill" *ngIf="game.discount_pct && game.discount_pct > 0">-{{ game.discount_pct }}%</span>
  </div>
  <div class="card-overlay">
    <p class="card-genre">{{ displayGenres || 'Videojuego' }}</p>
    <h3 class="card-name">{{ game.name }}</h3>
    <div class="card-row">
      <span class="card-rating">
        <mat-icon class="gm-icon-sm rating-star">star</mat-icon>
        {{ game.rating.toFixed(1) }}
      </span>
      <div class="price-wrap">
        <span class="orig" *ngIf="originalPriceLabel">{{ originalPriceLabel }}</span>
        <span class="card-price" [class.free]="game.is_free">{{ priceLabel }}</span>
      </div>
    </div>
  </div>
</div>
