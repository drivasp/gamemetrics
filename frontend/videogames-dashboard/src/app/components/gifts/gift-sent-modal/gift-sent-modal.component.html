<div class="modal-backdrop" *ngIf="gift$ | async as gift" (click)="close()">
  <div class="steam-modal" (click)="$event.stopPropagation()">
    <header class="modal-header">
      <h2>
        <mat-icon class="gm-icon-md">card_giftcard</mat-icon>
        ¡Regalo enviado!
      </h2>
      <button class="btn-close" (click)="close()" aria-label="Cerrar">
        <mat-icon class="gm-icon-sm">close</mat-icon>
      </button>
    </header>

    <div class="modal-body">
      <p class="lead">Tu regalo está en camino. El destinatario podrá aceptarlo en su inventario de regalos.</p>

      <div class="item-row">
        <div class="thumb">
          <app-game-cover
            [src]="gift.game_image"
            [alt]="gift.game_name"
            [slug]="gift.gift_id"
            [title]="gift.game_name"
            size="thumb">
          </app-game-cover>
        </div>
        <div class="item-info">
          <h3>{{ gift.game_name }}</h3>
          <p class="sub">Para: <strong>{{ gift.recipient_email }}</strong></p>
          <p class="msg" *ngIf="gift.message">“{{ gift.message }}”</p>
        </div>
        <div class="item-price">
          <span class="final">{{ gift.amount | currency:'USD':'symbol':'1.2-2' }}</span>
        </div>
      </div>
    </div>

    <footer class="modal-footer">
      <button class="btn-secondary" (click)="continueShopping()">Seguir comprando</button>
      <button class="btn-primary" (click)="viewSent()">Ver regalos enviados</button>
    </footer>
  </div>
</div>
